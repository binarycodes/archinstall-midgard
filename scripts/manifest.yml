  - fd # Simple, fast and user-friendly alternative to find
  - go-task # A task runner written in Go
  - iperf3 # TCP, UDP, and SCTP network bandwidth measurement tool
  - ipmitool # Command-line interface to IPMI-enabled devices
  - man-db # A utility for reading man pages
  - man-pages # Linux man pages
  - nfs-utils # Support programs for Network File Systems
  - openbsd-netcat # TCP/IP swiss army knife. OpenBSD variant
  - openssh # SSH protocol implementation for remote login, command execution and file transfer
  - pacman-contrib # Contributed scripts and tools for pacman systems
  - pkgfile # A tool to search for files in official repository packages
  - ripgrep # A search tool that combines the usability of ag with the raw speed of grep
  - rsync # A fast and versatile file copying tool for remote and local files
  - stow # Manage installation of multiple softwares in the same directory tree
  - texinfo # GNU documentation system for on-line information and printed output
  - tree # A directory listing program displaying a depth indented list of files
