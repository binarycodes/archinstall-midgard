  - direnv # A shell extension that manages your environment
  - git # the fast distributed version control system
  - go # Core compiler tools for the Go programming language
  - golangci-lint # Fast linters runner for Go
  - intellij-idea-community-edition # IDE for Java, Groovy and other programming languages with advanced refactoring features
  - jdk21-openjdk # OpenJDK Java 21 development kit
  - jq # Command-line JSON processor
  - maven # Java project management and project comprehension tool
  - opentofu # Lets you declaratively manage your cloud infrastructure
  - packer # tool for creating machine images for platforms from a single source configuration
  - podman # Tool and library for running OCI-based containers in pods
  - python # The Python programming language
  - uv # An extremely fast Python package installer and resolver written in Rust
  - terraform # HashiCorp tool for building and updating infrastructure as code idempotently
  - tflint # A linter for Terraform code
  - yq # Command-line YAML, XML, TOML processor - jq wrapper for YAML/XML/TOML documents

language_servers:
  - bash-language-server # Bash language server implementation based on Tree Sitter and its grammar for Bash
