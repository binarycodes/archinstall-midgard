---
pacstrap:
  - base # Minimal package set to define a basic Arch Linux installation
  - base-devel # Basic tools to build Arch Linux packages
  - btrfs-progs # Btrfs filesystem utilities
  - git # the fast distributed version control system
  - intel-ucode # Microcode update files for Intel CPUs
  - iptables # Linux kernel packet control tool (using nft interface)
  - less # A terminal based program for viewing text files
  - linux # The Linux kernel and modules
  - linux-firmware # Firmware files for Linux - Default set
  - linux-headers # Headers and scripts for building modules for the Linux kernel
  - mkinitcpio # Modular initramfs image creation utility
  - rsync # A fast and versatile file copying tool for remote and local files
  - vim # Vi Improved, a highly configurable, improved version of the vi text editor
  - yq # Command-line YAML, XML, TOML processor - jq wrapper for YAML/XML/TOML documents

post_chroot:
