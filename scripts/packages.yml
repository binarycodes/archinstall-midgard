    - openssh
    - sudo
    - yq
    - zsh

package_dependencies:
    - iptables # for docker port forwarding
    - go # for yay

basic_packages:
    - emacs
    - gnu-netcat
    - man-db
    - man-pages
    - openssh
    - pacman-contrib
    - pkgfile
    - rsync
    - stow
    - texinfo
    - unzip
    - vim
    - zsh
    - zsh-autosuggestions

essential_drivers:
    - bluez
    - bluez-utils
    - inxi
    - pavucontrol
    - pipewire
    - pipewire-alsa
    - pipewire-jack
    - pipewire-pulse
    - rtkit
    - sof-firmware
    - solaar

dev_packages:
    - ansible
    - dbeaver
    - direnv
    - docker
    - docker-compose
    - git
    - intellij-idea-community-edition
    - jdk21-openjdk
    - maven
    - packer
    - terraform

fonts:
    - freetype2
    - noto-fonts
    - otf-libertinus
    - otf-overpass
    - tex-gyre-fonts
    - ttf-bitstream-vera
    - ttf-caladea
    - ttf-carlito
    - ttf-dejavu
    - ttf-freefont
    - ttf-inconsolata
    - ttf-jetbrains-mono
    - ttf-jetbrains-mono-nerd
    - ttf-liberation
    - ttf-libertinus
    - ttf-opensans
    - ttf-roboto
