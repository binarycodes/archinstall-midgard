EDITOR="vim"
TERMINAL="foot"
BROWSER="qutebrowser"
# DISPLAY=:0 # useful for some scripts

# follow XDG base dir specification
XDG_CONFIG_HOME="$HOME/.config"
XDG_DATA_HOME="$HOME/.local/share"
XDG_CACHE_HOME="$HOME/.cache"

# history files
LESSHISTFILE="$XDG_CACHE_HOME/less_history"
PYTHON_HISTORY="$XDG_DATA_HOME/python/history"

# add scripts to path
PATH="$XDG_CONFIG_HOME/scripts:$PATH"

# moving other files and some other vars
GTK2_RC_FILES="$XDG_CONFIG_HOME/gtk-2.0/gtkrc-2.0" # gtk 3 & 4 are XDG compliant
WGETRC="$XDG_CONFIG_HOME/wget/wgetrc"
GNUPGHOME="$XDG_DATA_HOME/gnupg"
CARGO_HOME="$XDG_DATA_HOME/cargo"
GOPATH="$XDG_DATA_HOME/go"
GOBIN="$GOPATH/bin"
GOMODCACHE="$XDG_CACHE_HOME/go/mod"
NPM_CONFIG_USERCONFIG="$XDG_CONFIG_HOME/npm/npmrc"
GRADLE_USER_HOME="$XDG_DATA_HOME/gradle"
NUGET_PACKAGES="$XDG_CACHE_HOME/NuGetPackages"
_JAVA_OPTIONS=-Djava.util.prefs.userRoot="$XDG_CONFIG_HOME/java"
_JAVA_AWT_WM_NONREPARENTING=1
