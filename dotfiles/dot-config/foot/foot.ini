[main]
font=JetBrainsMono Nerd Font:size=6
dpi-aware=yes
pad=4x4

[csd]
preferred=none

[cursor]
style=beam
blink=yes

[scrollback]
lines=100000

[key-bindings]
clipboard-copy=Control+c XF86Copy
clipboard-paste=Control+v XF86Paste

[search-bindings]
cancel=Control+g Control+Shift+c Escape

[url-bindings]
cancel=Control+g Control+Shift+c Control+d Escape


[colors-dark]
foreground=F8F8F2
background=282A36
cursor=8C8C8C FFFFFF # foreground / background

regular0=000000  # black
regular1=FF5555  # red
regular2=50FA7B  # green
regular3=F1FA8C  # yellow
regular4=BD93F9  # blue
regular5=FF79C6  # magenta
regular6=8BE9FD  # cyan
regular7=BFBFBF  # white
bright0=545454   # bright black
bright1=FF6E67   # bright red
bright2=5AF78E   # bright green
bright3=F4F99D   # bright yellow
bright4=CAA9FA   # bright blue
bright5=FF92D0   # bright magenta
bright6=9AEDFE   # bright cyan
bright7=FFFFFF   # bright white

selection-foreground=F8F8F2
selection-background=44475A
